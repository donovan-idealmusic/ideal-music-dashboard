<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ideal Music — Dashboard</title>
<link rel="icon" href="/logo-mark.png" />
<style>
  html,body{height:100%;margin:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;}
  @media (prefers-color-scheme:dark){html,body{background:#000;}}
  #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s ease;z-index:9999;}
  #boot .bm{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#5e5ce6,#0a84ff 55%,#ff2d55);box-shadow:0 14px 40px rgba(94,92,230,.4);animation:bp .8s cubic-bezier(.22,1,.36,1) both;}
  #boot .sp{width:26px;height:26px;border-radius:50%;border:3px solid rgba(120,120,128,.24);border-top-color:#0a84ff;animation:bs .8s linear infinite;}
  @keyframes bs{to{transform:rotate(360deg);}}
  @keyframes bp{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot"><div class="bm"></div><div class="sp"></div></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script>
(async function () {
  try {
    var bust = '?v=' + Date.now();
    var res = await Promise.all([
      fetch('/template.html' + bust).then(function (r) { return r.text(); }),
      fetch('/app.src.jsx' + bust).then(function (r) { return r.text(); })
    ]);
    var tpl = res[0], src = res[1];
    var m = tpl.match(/<style>[\s\S]*?<\/style>/i);
    if (m) document.head.insertAdjacentHTML('beforeend', m[0]);
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    var s = document.createElement('script');
    s.textContent = out;
    document.body.appendChild(s);
    var boot = document.getElementById('boot');
    if (boot) { boot.style.opacity = '0'; setTimeout(function () { boot.remove(); }, 400); }
  } catch (e) {
    var b = document.getElementById('boot');
    if (b) b.innerHTML = '<div style="font:14px -apple-system;color:#8e8e93;text-align:center;max-width:280px;line-height:1.5">Could not load the dashboard. Please refresh.<br><span style="font-size:12px">' + String(e && e.message || e) + '</span></div>';
  }
})();
</script>
</body>
</html>
