<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ideal Music — Dashboard</title>
<link rel="icon" type="image/png" href="/logo-mark.png" />
<link rel="apple-touch-icon" href="/logo-mark.png" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f7;--bg-elev:rgba(255,255,255,0.72);--bg-solid:#ffffff;--sidebar:rgba(245,245,247,0.8);
  --text:#1d1d1f;--text-2:#6e6e73;--text-3:#8e8e93;--sep:rgba(0,0,0,0.08);--sep-strong:rgba(0,0,0,0.14);
  --accent:#0a84ff;--accent-2:#5e5ce6;--green:#34c759;--orange:#ff9f0a;--red:#ff3b30;--yellow:#ffd60a;--pink:#ff2d55;--teal:#30b0c7;
  --card:rgba(255,255,255,0.7);--card-solid:#fff;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 8px 30px rgba(0,0,0,0.06);--shadow-lg:0 10px 40px rgba(0,0,0,0.14);
  --radius:18px;--radius-sm:12px;--blur:saturate(180%) blur(30px);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
}
.dark{--bg:#000;--bg-elev:rgba(28,28,30,0.72);--bg-solid:#1c1c1e;--sidebar:rgba(22,22,24,0.8);--text:#f5f5f7;--text-2:#aeaeb2;--text-3:#8e8e93;--sep:rgba(255,255,255,0.1);--sep-strong:rgba(255,255,255,0.16);--card:rgba(44,44,46,0.6);--card-solid:#1c1c1e;--shadow:0 1px 2px rgba(0,0,0,0.4),0 8px 30px rgba(0,0,0,0.5);--shadow-lg:0 10px 40px rgba(0,0,0,0.6);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;letter-spacing:-0.01em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-thumb{background:var(--sep-strong);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
@keyframes sheetUp{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:none}}
.view{animation:fadeUp .5s cubic-bezier(.22,1,.36,1);}
.stagger>*{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) backwards;}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.10s}.stagger>*:nth-child(4){animation-delay:.14s}.stagger>*:nth-child(5){animation-delay:.18s}.stagger>*:nth-child(6){animation-delay:.22s}.stagger>*:nth-child(7){animation-delay:.26s}.stagger>*:nth-child(8){animation-delay:.30s}
.login{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(1200px 600px at 50% -10%,rgba(94,92,230,.18),transparent 60%),radial-gradient(900px 500px at 100% 100%,rgba(10,132,255,.16),transparent 60%),var(--bg);position:relative;overflow:hidden;}
.login .glow{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:fadeIn 1.4s ease both;}
.brandmark{width:84px;height:84px;border-radius:23px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#5e5ce6,#0a84ff 55%,#ff2d55);box-shadow:0 18px 50px rgba(94,92,230,.45);animation:pop .7s cubic-bezier(.22,1,.36,1) both;}
.brandmark svg{width:46px;height:46px;}
.login h1{font-size:34px;font-weight:700;margin-top:26px;letter-spacing:-0.03em;animation:fadeUp .6s .1s both;}
.login p.sub{color:var(--text-2);margin-top:8px;font-size:17px;animation:fadeUp .6s .16s both;}
.rolerow{display:flex;gap:18px;margin-top:42px;animation:fadeUp .6s .24s both;flex-wrap:wrap;justify-content:center;}
.rolecard{width:210px;padding:26px 22px;border-radius:22px;background:var(--card-solid);box-shadow:var(--shadow);text-align:left;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s,border-color .3s;border:1px solid var(--sep);position:relative;overflow:hidden;}
.rolecard:hover{transform:translateY(-8px) scale(1.02);box-shadow:var(--shadow-lg);}
.rolecard .ricon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:24px;}
.rolecard h3{font-size:19px;font-weight:650;}
.rolecard small{color:var(--text-2);font-size:13.5px;display:block;margin-top:6px;line-height:1.4;}
.rolecard .arrow{position:absolute;top:24px;right:22px;color:var(--text-3);transition:transform .3s,color .3s;}
.rolecard:hover .arrow{transform:translateX(4px);color:var(--accent);}
.langpick{display:flex;gap:8px;margin-top:34px;animation:fadeUp .6s .34s both;}
.langpick button{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:11px;background:var(--card-solid);border:1px solid var(--sep);font-size:13px;font-weight:540;color:var(--text-2);transition:all .2s;}
.langpick button.on{border-color:var(--accent);color:var(--text);box-shadow:0 2px 10px rgba(10,132,255,.18);}
.shell{display:flex;height:100%;}
.sidebar{width:248px;flex:0 0 248px;background:var(--sidebar);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-right:1px solid var(--sep);display:flex;flex-direction:column;padding:14px 12px;gap:2px;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:8px 10px 14px;}
.sb-brand .bm{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#5e5ce6,#0a84ff 55%,#ff2d55);display:flex;align-items:center;justify-content:center;}
.sb-brand .bm svg{width:18px;height:18px;}
.sb-brand b{font-size:15px;font-weight:650;letter-spacing:-0.02em;}
.sb-brand small{display:block;color:var(--text-3);font-size:11px;font-weight:500;margin-top:1px;}
.navlabel{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:14px 12px 4px;}
.navitem{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--text-2);transition:background .18s,color .18s;position:relative;width:100%;text-align:left;}
.navitem:hover{background:var(--sep);color:var(--text);}
.navitem.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(10,132,255,.4);}
.navitem .ico{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex:0 0 18px;}
.navitem .badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:600;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.navitem.active .badge{background:rgba(255,255,255,.3);}
.sb-spacer{flex:1;min-height:8px;}
.userchip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;transition:background .18s;width:100%;}
.userchip:hover{background:var(--sep);}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;}
.userchip .meta{text-align:left;overflow:hidden;}
.userchip .meta b{font-size:13px;font-weight:600;display:block;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;}
.userchip .meta small{font-size:11px;color:var(--text-3);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:54px;flex:0 0 54px;display:flex;align-items:center;gap:14px;padding:0 26px;background:var(--bg-elev);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--sep);position:relative;z-index:5;}
.topbar h2{font-size:19px;font-weight:680;letter-spacing:-0.02em;}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--sep);border-radius:10px;padding:7px 12px;width:280px;color:var(--text-3);transition:background .2s;cursor:text;}
.search:hover{background:var(--sep-strong);}
.search input{border:none;background:none;outline:none;font-size:13.5px;color:var(--text);width:100%;}
.search kbd{font-size:11px;background:var(--bg-solid);border:1px solid var(--sep);border-radius:5px;padding:1px 6px;color:var(--text-3);}
.iconbtn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:background .18s,color .18s;position:relative;}
.iconbtn:hover{background:var(--sep);color:var(--text);}
.iconbtn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg-elev);}
.content{flex:1;overflow-y:auto;padding:28px 32px 90px;}
.content.narrow{max-width:1180px;margin:0 auto;width:100%;}
.h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
.h-row h1{font-size:28px;font-weight:720;letter-spacing:-0.03em;}
.h-row p{color:var(--text-2);font-size:14px;margin-top:3px;}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-size:13.5px;font-weight:550;padding:9px 16px;border-radius:11px;transition:transform .12s,box-shadow .2s,filter .2s;box-shadow:0 4px 14px rgba(10,132,255,.32);white-space:nowrap;}
.btn:hover{filter:brightness(1.06);box-shadow:0 6px 20px rgba(10,132,255,.42);}
.btn:active{transform:scale(.96);}
.btn.ghost{background:var(--sep);color:var(--text);box-shadow:none;}
.btn.ghost:hover{background:var(--sep-strong);}
.btn.green{background:var(--green);box-shadow:0 4px 14px rgba(52,199,89,.32);}
.btn.red{background:var(--red);box-shadow:0 4px 14px rgba(255,59,48,.3);}
.btn.dark{background:var(--text);color:var(--bg-solid);box-shadow:none;}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:9px;}
.grid{display:grid;gap:16px;}
.card{background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--sep);border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s;}
.card.solid{background:var(--card-solid);}
.card.hover:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.stat{padding:20px 22px;}
.stat .lab{font-size:12.5px;color:var(--text-2);font-weight:550;display:flex;align-items:center;gap:8px;}
.stat .lab .si{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.stat .val{font-size:32px;font-weight:720;letter-spacing:-0.03em;margin-top:12px;}
.stat .delta{font-size:12.5px;font-weight:560;margin-top:4px;display:flex;align-items:center;gap:4px;}
.delta.up{color:var(--green);}.delta.down{color:var(--red);}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:560;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.pill .pdot{width:7px;height:7px;border-radius:50%;}
.pri{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:7px;white-space:nowrap;}
.kan{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;}
.kancol{flex:0 0 290px;width:290px;}
.kanhead{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;font-size:13px;font-weight:650;}
.kanhead .ct{margin-left:auto;background:var(--sep);color:var(--text-2);font-size:11px;font-weight:600;border-radius:8px;padding:1px 8px;}
.kancard{background:var(--card-solid);border:1px solid var(--sep);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s;cursor:pointer;}
.kancard:hover{transform:translateY(-3px) scale(1.01);box-shadow:var(--shadow-lg);}
.kancard h4{font-size:14.5px;font-weight:620;margin-bottom:6px;}
.kancard .kmeta{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11.5px;color:var(--text-3);}
.cover{height:80px;border-radius:10px;margin-bottom:12px;position:relative;overflow:hidden;}
.cover .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cover .play span{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:11.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;padding:0 16px 12px;}
.tbl td{padding:14px 16px;border-top:1px solid var(--sep);font-size:13.5px;}
.tbl tr{transition:background .15s;}
.tbl tbody tr:hover{background:var(--sep);cursor:pointer;}
.seg{display:inline-flex;background:var(--sep);border-radius:10px;padding:3px;gap:2px;}
.seg button{padding:6px 14px;font-size:13px;font-weight:540;border-radius:8px;color:var(--text-2);transition:all .2s;}
.seg button.on{background:var(--bg-solid);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.pd-head{display:flex;gap:22px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;}
.pd-cover{width:150px;height:150px;border-radius:20px;flex:0 0 150px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);cursor:pointer;}
.pd-cover .pc-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.12);opacity:0;transition:opacity .3s;}
.pd-cover:hover .pc-play{opacity:1;}
.pd-cover .pc-play span{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--sep);margin-bottom:22px;overflow-x:auto;}
.tab{padding:10px 4px;margin-right:18px;font-size:14px;font-weight:560;color:var(--text-2);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;}
.tab.on{color:var(--text);border-bottom-color:var(--accent);}
.wave{display:flex;align-items:center;gap:2px;height:64px;cursor:pointer;}
.wave .bar{flex:1;border-radius:2px;background:var(--sep-strong);transition:background .15s,height .2s;min-width:2px;}
.wave .bar.played{background:var(--accent);}
.wave .bar.marker{background:var(--orange);}
.pp-btn{width:42px;height:42px;border-radius:50%;background:var(--text);color:var(--bg-solid);display:flex;align-items:center;justify-content:center;flex:0 0 42px;transition:transform .15s;}
.pp-btn:active{transform:scale(.9);}
.comment{display:flex;gap:12px;padding:14px 0;border-top:1px solid var(--sep);}
.comment:first-child{border-top:none;}
.comment .body{flex:1;}
.comment .body .top{display:flex;align-items:center;gap:8px;font-size:13px;}
.comment .ts{font-size:11.5px;font-weight:600;color:var(--accent);background:rgba(10,132,255,.12);padding:1px 7px;border-radius:6px;cursor:pointer;}
.comment p{font-size:13.5px;color:var(--text);margin-top:5px;line-height:1.5;}
.chat{display:flex;flex-direction:column;height:calc(100vh - 230px);}
.chatscroll{flex:1;overflow-y:auto;padding:8px 4px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:72%;padding:10px 14px;border-radius:18px;font-size:13.5px;line-height:1.45;animation:pop .35s cubic-bezier(.22,1,.36,1);}
.msg.them{background:var(--sep);border-bottom-left-radius:5px;align-self:flex-start;}
.msg.me{background:var(--accent);color:#fff;border-bottom-right-radius:5px;align-self:flex-end;}
.msg .who{font-size:11px;font-weight:600;opacity:.7;margin-bottom:2px;}
.chatblock{align-self:center;background:rgba(255,159,10,.14);color:var(--orange);font-size:12px;font-weight:560;padding:8px 14px;border-radius:12px;display:flex;align-items:center;gap:8px;max-width:80%;text-align:center;}
.chatbar{display:flex;gap:10px;align-items:center;padding-top:14px;border-top:1px solid var(--sep);margin-top:8px;}
.chatbar input{flex:1;background:var(--sep);border:none;outline:none;border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);}
.permtable td,.permtable th{text-align:center;}
.permtable td:first-child,.permtable th:first-child{text-align:left;}
.fileitem{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;transition:background .15s;cursor:pointer;}
.fileitem:hover{background:var(--sep);}
.fileicon{border-radius:10px;display:flex;align-items:center;justify-content:center;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;animation:fadeIn .2s;}
.cmdk{width:min(580px,90%);background:var(--bg-elev);backdrop-filter:var(--blur);border:1px solid var(--sep);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden;animation:sheetUp .35s cubic-bezier(.22,1,.36,1);}
.cmdk .cin{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--sep);}
.cmdk input{flex:1;border:none;background:none;outline:none;font-size:17px;color:var(--text);}
.cmdrow{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:14px;transition:background .12s;cursor:pointer;}
.cmdrow.sel{background:var(--accent);color:#fff;}
.cmdrow .ci{width:30px;height:30px;border-radius:8px;background:var(--sep);display:flex;align-items:center;justify-content:center;}
.cmdrow.sel .ci{background:rgba(255,255,255,.25);}
.notif-panel{position:absolute;top:50px;right:16px;width:360px;background:var(--bg-elev);backdrop-filter:var(--blur);border:1px solid var(--sep);border-radius:16px;box-shadow:var(--shadow-lg);z-index:60;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);overflow:hidden;}
.notif{display:flex;gap:11px;padding:13px 16px;border-top:1px solid var(--sep);transition:background .15s;}
.notif:hover{background:var(--sep);}
.notif .nd{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px;flex:0 0 8px;}
.empty{text-align:center;padding:60px 20px;color:var(--text-3);}
.modal-sheet{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);animation:fadeIn .2s;padding:20px;}
.sheet{width:min(520px,100%);max-height:90vh;overflow-y:auto;background:var(--bg-solid);border-radius:20px;box-shadow:var(--shadow-lg);padding:26px;animation:sheetUp .4s cubic-bezier(.22,1,.36,1);}
.sheet.wide{width:min(720px,100%);}
.field{margin-bottom:14px;}
.field label{font-size:12.5px;font-weight:600;color:var(--text-2);display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:var(--sep);border:1px solid transparent;border-radius:11px;padding:10px 13px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.anon-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent-2);background:rgba(94,92,230,.12);padding:3px 9px;border-radius:7px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg-solid);padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:550;box-shadow:var(--shadow-lg);z-index:200;animation:sheetUp .35s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:9px;}
.progressbar{height:6px;background:var(--sep);border-radius:6px;overflow:hidden;}
.progressbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .6s cubic-bezier(.22,1,.36,1);}
.ring{transform:rotate(-90deg);}
.ring circle{fill:none;stroke-width:5;stroke-linecap:round;}
/* drive tree */
.tree{font-size:13.5px;}
.tnode{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;transition:background .15s;cursor:pointer;}
.tnode:hover{background:var(--sep);}
.tchild{margin-left:18px;border-left:1.5px solid var(--sep);padding-left:8px;}
.mono{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:12px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;}
/* invoice */
.invoice{background:#fff;color:#1d1d1f;border-radius:14px;padding:34px;box-shadow:var(--shadow);font-size:13px;}
.invoice .ihead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;}
.invoice table{width:100%;border-collapse:collapse;margin:18px 0;}
.invoice th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8e8e93;border-bottom:1px solid #e3e3e8;padding:8px 6px;}
.invoice td{padding:10px 6px;border-bottom:1px solid #f0f0f4;font-size:13px;}
.dropzone{border:2px dashed var(--sep-strong);border-radius:16px;padding:34px;text-align:center;color:var(--text-3);transition:all .2s;cursor:pointer;}
.dropzone:hover{border-color:var(--accent);color:var(--accent);background:rgba(10,132,255,.04);}
.signbox{border:1px solid var(--sep);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.signed-script{font-family:"Snell Roundhand","Brush Script MT",cursive;font-size:26px;}
.langrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;border:1px solid var(--sep);margin-bottom:10px;transition:all .2s;cursor:pointer;}
.langrow.on{border-color:var(--accent);background:rgba(10,132,255,.05);}
.pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.pipecol{flex:0 0 240px;background:var(--card);border:1px solid var(--sep);border-radius:14px;padding:12px;}
/* ===== premium login ===== */
.login .glow{transition:opacity 1s ease;}
.signwrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;padding:20px;}
.signcard{width:min(420px,92vw);background:var(--bg-elev);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--sep);border-radius:30px;box-shadow:var(--shadow-lg);padding:40px 34px 28px;text-align:center;animation:sheetUp .7s cubic-bezier(.22,1,.36,1) both;}
.signcard .brandmark{margin:0 auto 22px;width:76px;height:76px;border-radius:21px;}
.signcard .brandmark svg{width:40px;height:40px;}
.signcard h1{font-size:27px;font-weight:720;letter-spacing:-0.03em;margin:0;}
.signcard .sub{color:var(--text-2);font-size:14.5px;line-height:1.45;margin:8px auto 26px;max-width:300px;}
.passkey-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--text);color:var(--bg-solid);font-size:15px;font-weight:600;padding:15px 18px;border-radius:15px;transition:transform .14s cubic-bezier(.22,1,.36,1),box-shadow .25s,filter .2s;box-shadow:0 10px 26px rgba(0,0,0,.20);}
.passkey-btn:hover{filter:brightness(1.1);box-shadow:0 14px 34px rgba(0,0,0,.26);transform:translateY(-1px);}
.passkey-btn:active{transform:scale(.97);}
.passkey-meta{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text-3);font-size:12px;margin-top:14px;}
.ghost-link{margin-top:20px;color:var(--accent);font-size:13.5px;font-weight:550;transition:opacity .2s;}
.ghost-link:hover{opacity:.65;}
.verifying{display:flex;flex-direction:column;align-items:center;gap:16px;padding:18px 0 8px;animation:fadeIn .3s;}
.spinner{width:46px;height:46px;border-radius:50%;border:3px solid var(--sep);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.success-check{width:54px;height:54px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(52,199,89,.4);animation:pop .45s cubic-bezier(.22,1,.36,1);}
.err-badge{width:54px;height:54px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(255,159,10,.4);animation:pop .45s cubic-bezier(.22,1,.36,1);}
.role-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.role-list>*{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) backwards;}
.role-list>*:nth-child(1){animation-delay:.04s}.role-list>*:nth-child(2){animation-delay:.1s}.role-list>*:nth-child(3){animation-delay:.16s}
.role-row{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:16px;border:1px solid var(--sep);background:var(--card-solid);text-align:left;transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s,border-color .2s;}
.role-row:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--sep-strong);}
.role-row:active{transform:scale(.98);}
.role-row .ricon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 42px;}
.role-row b{font-size:15px;font-weight:620;display:block;}
.role-row small{font-size:12px;color:var(--text-3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.role-row .chev{margin-left:auto;color:var(--text-3);flex:0 0 18px;}
.signcard .langpick{margin-top:26px;justify-content:center;flex-wrap:wrap;}
.signcard .langpick button{padding:7px 12px;font-size:12.5px;}
.login-foot{position:relative;z-index:2;margin-top:20px;color:var(--text-3);font-size:12px;display:flex;align-items:center;gap:6px;}
.auth-or{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:var(--text-3);font-size:12px;}
.auth-or::before,.auth-or::after{content:"";flex:1;height:1px;background:var(--sep);}
.email-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--sep);color:var(--text);font-size:14.5px;font-weight:560;padding:13px 18px;border-radius:14px;transition:background .2s,transform .12s;}
.email-btn:hover{background:var(--sep-strong);}
.email-btn:active{transform:scale(.97);}
.email-input{width:100%;background:var(--sep);border:1.5px solid transparent;border-radius:14px;padding:14px 16px;font-size:15px;color:var(--text);outline:none;text-align:center;transition:border-color .2s;}
.email-input:focus{border-color:var(--accent);}
.passkey-btn:disabled{opacity:.6;cursor:default;}
</style>
</head>
